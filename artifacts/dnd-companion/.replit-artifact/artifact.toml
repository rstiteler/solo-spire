kind = "web"
previewPath = "/"
title = "Solo D&D 5e Companion"
version = "1.0.0"
id = "artifacts/dnd-companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20660

[services.development]
run = "pnpm --filter @workspace/dnd-companion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dnd-companion", "run", "build" ]
publicDir = "artifacts/dnd-companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20660"
BASE_PATH = "/"
